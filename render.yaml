services:
  # Backend Web Service
  - type: web
    name: examsphere-api
    runtime: docker
    repo: https://github.com/Sujoy1125/examsphere
    region: oregon
    plan: free
    branch: main
    dockerfilePath: ./backend/examsphere-backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: examsphere-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: examsphere-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: examsphere-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://examsphere.onrender.com,https://examsphere-app.onrender.com
      - key: PORT
        value: 8080

  # Frontend Static Site
  - type: static
    name: examsphere-app
    runtime: static
    repo: https://github.com/Sujoy1125/examsphere
    region: oregon
    plan: free
    branch: main
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://examsphere-api.onrender.com/api

databases:
  - name: examsphere-db
    region: oregon
    plan: free
    databaseName: examsphere
    user: examsphere

